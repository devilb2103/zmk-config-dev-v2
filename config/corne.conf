# Device name
CONFIG_ZMK_KEYBOARD_NAME="Dev's Corne V4"

# Idle: 1min, deep sleep: 5min.
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=540000
# Required to actually enter deep sleep after IDLE_SLEEP_TIMEOUT.
CONFIG_ZMK_SLEEP=y
# Enable &soft_off behavior (full power-off; reset button to wake).
CONFIG_ZMK_PM_SOFT_OFF=y

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# N-key rollover — report unlimited simultaneous keys instead of the 6KRO default.
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# BLE conn interval per Apple Accessory Design Guidelines R23 §55.6 (BLE HID).
# 11.25ms min (HID-specific floor), 15ms max, 0 latency, 6s supervision timeout.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=9
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# 2M PHY — doubles BLE radio bitrate so larger HID reports fit in a single packet.
CONFIG_BT_AUTO_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_2M=y
# Tighten split (central↔peripheral) interval: 7.5ms.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=50

# Enable OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# --- nice!oled widgets ---

# Central (left): hide WPM number + speedometer, keep bongo cat tapping with typing.
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=n
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=300

# Peripheral (right): swap default cat for the spinning gem.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y

# Small gap between modifier icons (end Y=130) and profile, layer right below.
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=133
CONFIG_NICE_OLED_WIDGET_LAYER=y
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=144

# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Device name
CONFIG_ZMK_KEYBOARD_NAME="Dev's Corne V4"

# Idle: 1min, deep sleep: 5min.
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
# Required to actually enter deep sleep after IDLE_SLEEP_TIMEOUT.
CONFIG_ZMK_SLEEP=y

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# N-key rollover — report unlimited simultaneous keys instead of the 6KRO default.
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Tighten BLE conn interval to host: 7.5–15ms (units of 1.25ms).
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
# Tighten split (central↔peripheral) interval: 7.5ms.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=50

# Enable OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# --- nice!oled widgets ---

# Central (left): BT + battery + profile dots are shown by default.
# Hide the WPM number + speedometer, keep Bongo Cat tapping with typing.
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=n
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=300

# Peripheral (right): swap default cat for the spinning gem (diamond).
# Battery is shown by default.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y

# Trying low Y to verify layer widget renders at all.
CONFIG_NICE_OLED_WIDGET_LAYER=y
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=20

# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
